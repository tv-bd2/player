<!DOCTYPE html>
<html>
<head>
    <title>RS Player - Fluid</title>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
        #video-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="my-video">
        <source src="আপনার_m3u8_লিঙ্ক_এখানে" type="application/x-mpegURL">
    </video>
</div>

<script>
    var myFP = fluidPlayer('my-video', {
        layoutControls: {
            fillToContainer: true, // পুরো স্ক্রিন জুড়ে থাকবে
            primaryColor: "#00c3ff", // আপনার ব্র্যান্ড কালার
            posterImage: 'your-thumbnail.jpg',
            autoPlay: true,
            mute: false,
            allowLandscapeOnFullScreen: true, // মোবাইল রোটেশন সহজ করবে
            playbackRateControl: true,
            allowDownload: false
        }
    });
</script>

</body>
</html>
