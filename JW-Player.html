<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>RS Player Pro</title>

<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
<script>
jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:sans-serif;position:fixed;}

#player-wrapper{position:relative;width:100%;height:100%;}
#player{width:100%!important;height:100%!important;position:absolute;top:0;left:0;}

/* LOADER */
#loader{
position:absolute;top:0;left:0;width:100%;height:100%;
background:#000;display:flex;justify-content:center;align-items:center;
flex-direction:column;z-index:99;
}

.loader-container{position:relative;width:100px;height:100px;display:flex;justify-content:center;align-items:center;}

.neon-ring{
position:absolute;width:100%;height:100%;border-radius:50%;
border:2px solid transparent;animation:rotate 1.5s linear infinite;
}

.neon-ring:nth-child(1){border-top:2px solid #00c3ff;border-right:2px solid #00c3ff;}
.neon-ring:nth-child(2){border-bottom:2px solid #ff007f;border-left:2px solid #ff007f;animation-direction:reverse;}

@keyframes rotate{100%{transform:rotate(360deg);}}

.brand-name{color:#fff;font-size:12px;margin-top:10px;text-align:center;}
.brand-name span{color:#00c3ff;}

.loading-text{color:#aaa;font-size:10px;margin-top:10px;}

/* HIDE */
.hide-now{opacity:0;visibility:hidden;transition:.3s;}

/* AD SCREEN */
#ad-screen{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;z-index:9999;
display:flex;justify-content:center;align-items:center;
flex-direction:column;
}

.ad-box{text-align:center;color:#fff;}

.ad-title{color:#00c3ff;margin-bottom:15px;}

.ad-btn{
padding:10px 20px;
background:#00c3ff;
border:none;
color:#000;
font-weight:bold;
border-radius:5px;
margin-bottom:10px;
cursor:pointer;
}

.skip-btn{
padding:8px 15px;
background:#444;
border:none;
color:#fff;
border-radius:5px;
cursor:not-allowed;
}
</style>
</head>

<body>

<!-- AD SCREEN -->
<div id="ad-screen">
    <div class="ad-box">
        <div class="ad-title">Advertisement</div>

        <button class="ad-btn" onclick="openAd()">Open Ad</button>

        <button id="skipBtn" class="skip-btn" disabled>
            Skip in <span id="count">5</span>s
        </button>
    </div>
</div>

<div id="player-wrapper">

<!-- LOADER -->
<div id="loader">
    <div class="loader-container">
        <div class="neon-ring"></div>
        <div class="neon-ring"></div>
    </div>
    <div class="brand-name">RS LIVE <span>TV</span></div>
    <div class="loading-text">BUFFERING...</div>
</div>

<div id="player"></div>
</div>

<script>
const adLink = "https://www.profitablecpmratenetwork.com/gtipkqr7ri?key=bc6ace2ae4c52669346ae667eeb6f214";

let time = 5;
const countEl = document.getElementById("count");
const skipBtn = document.getElementById("skipBtn");

const timer = setInterval(()=>{
    time--;
    countEl.innerText = time;

    if(time <= 0){
        clearInterval(timer);
        skipBtn.innerText = "Skip Ad";
        skipBtn.disabled = false;
        skipBtn.style.cursor = "pointer";
    }
},1000);

function openAd(){
    window.open(adLink,"_blank");
    skipAd();
}

function skipAd(){
    document.getElementById("ad-screen").style.display="none";
}

/* PLAYER */
const urlParams = new URLSearchParams(window.location.search);
const streamSource = urlParams.get("url");

if(streamSource){
    const player = jwplayer("player").setup({
        playlist:[{file:streamSource,type:"hls"}],
        width:"100%",
        height:"100%",
        autostart:true,
        stretching:"exactfit",
        displaytitle:false
    });

    player.on("play",()=>{
        document.getElementById("loader").classList.add("hide-now");
    });

    player.on("buffer",()=>{
        document.getElementById("loader").classList.remove("hide-now");
    });

    player.on("error",()=>{
        document.getElementById("loader").innerHTML=
        `<div style="color:#fff;text-align:center;">
            <i class="fas fa-exclamation-triangle" style="color:red;font-size:40px;"></i>
            <p>Stream Offline</p>
        </div>`;
    });

}else{
    document.getElementById("loader").innerHTML="No Stream URL Found";
}
</script>

</body>
</html>
