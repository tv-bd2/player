<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Slim - DPlayer Neon</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        /* DPlayer Container */
        #dplayer { width: 100% !important; height: 100% !important; position: absolute; top:0; left:0; }

        /* Loader Style */
        #loader {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:9999; flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .loader-container { position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; }
        .loader-brand { text-align: center; z-index: 10; }
        .tv-icon { font-size: 28px; color: #00c3ff; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0, 195, 255, 0.7); }
        .brand-name { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        .brand-name span { color: #00c3ff; }

        .neon-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; animation: ring-rotate 2s linear infinite; }
        .neon-ring:nth-child(1) { border-bottom: 1.5px solid #00c3ff; box-shadow: 0 2px 8px rgba(0, 195, 255, 0.4); }
        .neon-ring:nth-child(2) { border-right: 1.5px solid rgba(255, 255, 255, 0.5); animation: ring-rotate 1.5s linear infinite reverse; }

        @keyframes ring-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hide-now { opacity: 0; visibility: hidden; pointer-events: none; }

        /* Error Message */
        .error-content { text-align: center; color: #fff; z-index: 10000; }
        .error-content i { font-size: 40px; color: #ff4d4d; margin-bottom: 15px; }

        /* Customizing DPlayer Colors */
        .dplayer-setting-speeds-item:hover, .dplayer-setting-quality-item:hover { color: #00c3ff !important; }
        .dplayer-thumb { background: #00c3ff !important; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-container">
        <div class="neon-ring"></div>
        <div class="neon-ring"></div>
        <div class="loader-brand">
            <i class="fas fa-tv tv-icon"></i>
            <div class="brand-name">RS LIVE <span>TV</span></div>
        </div>
    </div>
</div>

<div id="dplayer"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

<script>
    function getStreamUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('url');
    }

    const streamSource = getStreamUrl();
    const loader = document.getElementById('loader');

    if (streamSource) {
        const dp = new DPlayer({
            container: document.getElementById('dplayer'),
            live: true,
            autoplay: true,
            theme: '#00c3ff', // আপনার নিয়ন ব্লু থিম
            loop: true,
            lang: 'en',
            video: {
                url: streamSource,
                type: 'hls'
            }
        });

        // প্লে শুরু হলে লোডার চলে যাবে
        dp.on('playing', function () {
            loader.classList.add('hide-now');
        });

        // বাফারিং হলে লোডার আবার আসবে
        dp.on('waiting', function () {
            loader.classList.remove('hide-now');
        });

        // এরর হ্যান্ডলিং
        dp.on('error', function () {
            showError();
        });

    } else {
        loader.innerHTML = '<div class="error-content"><p>No Stream URL Found!</p></div>';
    }

    function showError() {
        loader.classList.remove('hide-now');
        loader.style.opacity = "1";
        loader.style.visibility = "visible";
        loader.innerHTML = `
            <div class="error-content">
                <i class="fas fa-exclamation-circle"></i>
                <p>Stream Offline or Expired!</p>
                <div class="brand-name">RS LIVE <span>TV</span></div>
            </div>
        `;
    }
</script>

</body>
</html>
