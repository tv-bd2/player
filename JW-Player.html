<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Clean & Fast</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* আল্ট্রা ক্লিন রিসেট */
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { 
            width:100%; height:100%; background:#000; 
            overflow:hidden; font-family: 'Segoe UI', sans-serif; 
            position: fixed; touch-action: none;
        }
        
        /* ভিডিও রোটেট ও স্ট্রেচ ফিক্স */
        #player { width:100% !important; height:100% !important; position: absolute; }
        
        /* জোরপূর্বক ভিডিও ফিল এবং সঠিক রেশিও */
        .jw-video.jw-reset { 
            object-fit: contain !important; /* রোটেট হলে ভিডিও কাটবে না */
            background: #000;
        }

        /* লোডার কন্টেইনার (মডার্ন ডিজাইন) */
        #loader {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:9999; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-container {
            position: relative; width: 150px; height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* প্রিমিয়াম লোডিং স্পিনার (নতুন এনিমেশন) */
        .neon-spinner {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 3px solid transparent;
            border-top-color: #00c3ff;
            border-bottom-color: transparent;
            animation: modernSpin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        .neon-spinner:before,
        .neon-spinner:after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        .neon-spinner:before {
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border-top-color: #ff007f;
            border-bottom-color: transparent;
            animation: modernSpin 1s linear infinite reverse;
        }

        .neon-spinner:after {
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border-top-color: #00c3ff;
            border-bottom-color: transparent;
            animation: modernSpin 0.8s ease-in-out infinite;
        }

        @keyframes modernSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-brand { text-align: center; z-index: 10; margin-top: 15px; }
        .tv-icon { font-size: 30px; color: #00c3ff; text-shadow: 0 0 10px #00c3ff; animation: pulseIcon 1.5s ease-in-out infinite; }
        .brand-name { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 1px; margin-top: 5px; text-transform: uppercase; }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .hide-now { opacity: 0 !important; visibility: hidden !important; }

        /* এরর মেসেজ */
        .error-ui { text-align: center; color: #fff; }
        .error-ui i { font-size: 40px; color: #ff4d4d; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-container">
        <div class="neon-spinner"></div>
        <div class="loader-brand">
            <i class="fas fa-tv tv-icon"></i>
            <div class="brand-name">RS LIVE <span>TV</span></div>
        </div>
    </div>
</div>

<div id="player"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "uniform", // রোটেট সমস্যার জন্য uniform সেরা
            cast: {}, 
            playbackRateControls: false,
            displaytitle: false,
            displaydescription: false
        });

        player.on("ready", function() {
            player.setMute(false);
            player.setVolume(100);
        });

        player.on("play", function() {
            document.getElementById("loader").classList.add("hide-now");
        });

        player.on("error", function() {
            const loader = document.getElementById("loader");
            loader.classList.remove("hide-now");
            loader.innerHTML = `
                <div class="error-ui">
                    <i class="fas fa-redo-alt"></i>
                    <p>Stream Error!</p>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>
            `;
        });

        // স্ক্রিন রোটেট ফিক্স
        window.addEventListener("orientationchange", function() {
            player.resize(); 
        });

    } else {
        document.getElementById("loader").innerHTML = '<div style="color:white">No URL Found</div>';
    }
</script>

</body>
</html>
