<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - No Cut Full Update</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        #player-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }

        /* --- কন্ট্রোলার কাস্টমাইজেশন (ব্লার রিমুভড) --- */
        .jw-skin-glow .jw-display-icon-container { 
            background: rgba(255, 255, 255, 0.1) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: none !important; /* ব্লার রিমুভ করা হয়েছে */
        }
        .jw-skin-glow .jw-button-color { color: #ffffff !important; }
        .jw-skin-glow .jw-controlbar { 
            background: transparent !important; /* ব্যাকগ্রাউন্ড পুরোপুরি স্বচ্ছ */
            backdrop-filter: none !important; /* ব্লার রিমুভ করা হয়েছে */
        }

        /* --- লোডার ডিজাইন --- */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:99; flex-direction: column; transition: opacity 0.4s ease;
        }

        .loader-container {
            position: relative; width: 150px; height: 150px;
            display: flex; justify-content: center; align-items: center;
        }

        .loader-brand { text-align: center; z-index: 10; }
        .tv-icon { font-size: 35px; color: #00c3ff; text-shadow: 0 0 15px #00c3ff; }
        .brand-name { font-size: 14px; font-weight: 700; color: #fff; text-transform: uppercase; margin-top: 10px; letter-spacing: 1px; }
        .brand-name span { color: #00c3ff; }

        .neon-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2.5px solid transparent;
            animation: rotate-vortex 1.5s linear infinite;
        }
        .neon-ring:nth-child(1) { border-top: 2.5px solid #00c3ff; border-right: 2.5px solid #00c3ff; box-shadow: 0 0 15px #00c3ff; }
        .neon-ring:nth-child(2) { border-bottom: 2.5px solid #ff007f; border-left: 2.5px solid #ff007f; animation-direction: reverse; animation-duration: 2s; box-shadow: 0 0 15px #ff007f; }

        @keyframes rotate-vortex { 100% { transform: rotate(360deg); } }

        .loading-text { color: rgba(255, 255, 255, 0.6); font-size: 11px; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- ভিডিও সাইড কাটা ফিক্স --- */
        .jw-video.jw-reset { 
            object-fit: fill !important; /* এটি ভিডিওকে স্ট্রেচ করে পুরো স্ক্রিন ফিল করবে, সাইড কাটবে না */
        }
        
        .hide-now { opacity: 0 !important; visibility: hidden !important; }

        /* এরর মেসেজ */
        .error-content { text-align: center; color: #fff; z-index: 100; }
        .error-content i { font-size: 50px; color: #ff4d4d; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="loader">
        <div class="loader-container">
            <div class="neon-ring"></div>
            <div class="neon-ring"></div>
            <div class="loader-brand">
                <i class="fas fa-tv tv-icon"></i>
                <div class="brand-name">RS LIVE <span>TV</span></div>
            </div>
        </div>
        <div class="loading-text">BUFFERING...</div>
    </div>
    <div id="player"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "exactfit", /* ভিডিও টেনে পুরো স্ক্রিন জুড়ে দেখানোর জন্য */
            skin: { name: "glow" },
            displaytitle: false
        });

        player.on("ready", () => {
            player.setMute(false);
            player.setVolume(100);
        });

        player.on("play", () => {
            document.getElementById("loader").classList.add("hide-now");
        });

        player.on("buffer", () => {
            document.getElementById("loader").classList.remove("hide-now");
        });

        player.on("error", () => {
            const loader = document.getElementById("loader");
            loader.classList.remove("hide-now"); 
            loader.innerHTML = `
                <div class="error-content">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Stream Offline!</p>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>
            `;
        });

    } else {
        document.getElementById("loader").innerHTML = '<div class="brand-name">No Stream URL Found</div>';
    }
</script>

</body>
</html>
