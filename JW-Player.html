<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player - Stretch to Fit</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; }
        
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }

        /* ভিডিওকে জুম না করে টেনে লম্বা করে পুরো স্ক্রিনে ফিট করার জন্য CSS */
        .jw-video.jw-reset {
            object-fit: fill !important; /* এটি ভিডিওর কোনো অংশ কাটবে না, কিন্তু টেনে লম্বা করে দিবে */
        }

        /* লোডার */
        #loader {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:#000; display:flex; justify-content:center; align-items:center;
            z-index:9999; flex-direction:column;
        }
        .spinner {
            width:50px; height:50px; border:4px solid rgba(255,255,255,.1);
            border-top:4px solid #00c3ff; border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<div id="player"></div>

<script>
    function getStreamUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('url');
    }

    const streamSource = getStreamUrl();

    if (streamSource) {
        const player = jwplayer("player");

        player.setup({
            playlist: [{
                file: streamSource,
                type: "hls"
            }],
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false,
            // 'exactfit' ভিডিওকে টেনে স্ক্রিনের চার কোণায় পৌঁছে দেয় (কোনো অংশ কাটে না)
            stretching: "exactfit", 
            controls: true
        });

        player.on("ready", function() {
            document.getElementById("loader").style.display = "none";
            player.setMute(false);
            player.setVolume(100);
        });

        player.on("play", function() {
            document.getElementById("loader").style.display = "none";
        });

    }
</script>

</body>
</html>
