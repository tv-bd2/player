<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Pro - Zoom Fill</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        #player-container { width:100%; height:100%; position: relative; overflow: hidden; }
        #player { width:100% !important; height:100% !important; position: absolute; }

        /* --- কন্ট্রোল আইকন সাদা ও গ্লাস ইফেক্ট --- */
        .jw-skin-glow .jw-button-color { color: #ffffff !important; }
        .jw-skin-glow .jw-controlbar { background: rgba(255, 255, 255, 0.05) !important; backdrop-filter: blur(10px); }
        .jw-display-icon-container { background: rgba(255, 255, 255, 0.1) !important; border: 1px solid rgba(255, 255, 255, 0.2); }

        /* লোডার ডিজাইন (প্লেয়ারের ভেতরে ফিক্সড) */
        #loader {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:99; flex-direction: column;
        }

        .loader-container {
            position: relative; width: 120px; height: 120px;
            display: flex; justify-content: center; align-items: center;
        }

        .loader-brand { text-align: center; z-index: 10; }
        .tv-icon { font-size: 28px; color: #00c3ff; text-shadow: 0 0 10px #00c3ff; }
        .brand-name { font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; margin-top: 5px; }
        .brand-name span { color: #00c3ff; }

        .neon-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid transparent;
            animation: rotate 2s linear infinite;
        }
        .neon-ring:nth-child(1) { border-top: 2px solid #00c3ff; box-shadow: 0 0 15px #00c3ff; }
        .neon-ring:nth-child(2) { border-bottom: 2px solid #ff007f; animation-duration: 1.5s; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* ভিডিও জুম টু ফিল (Zoom to Fill) ফিক্স */
        .jw-video.jw-reset { 
            object-fit: cover !important; /* এটাই ভিডিওকে জুম করে ফুল স্ক্রিন করবে */
        }

        .hide-now { opacity: 0 !important; visibility: hidden !important; transition: 0.5s; }

        /* অটো ফ্লিপ ল্যান্ডস্কেপ */
        @media screen and (orientation: portrait) {
            .jw-state-fullscreen {
                transform: rotate(90deg);
                width: 100vh !important;
                height: 100vw !important;
            }
        }
    </style>
</head>
<body>

<div id="player-container">
    <div id="loader">
        <div class="loader-container">
            <div class="neon-ring"></div>
            <div class="neon-ring"></div>
            <div class="loader-brand">
                <i class="fas fa-tv tv-icon"></i>
                <div class="brand-name">RS LIVE <span>TV</span></div>
            </div>
        </div>
    </div>
    <div id="player"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamSource = urlParams.get('url');

    if (streamSource) {
        const player = jwplayer("player").setup({
            playlist: [{ file: streamSource, type: "hls" }],
            width: "100%",
            height: "100%",
            autostart: true,
            stretching: "fill", // ভিডিও টেনে স্ক্রিন পূর্ণ করবে
            skin: { name: "glow" },
            displaytitle: false
        });

        player.on("play", () => {
            document.getElementById("loader").classList.add("hide-now");
        });

        player.on("buffer", () => {
            document.getElementById("loader").classList.remove("hide-now");
        });

        // ফুলস্ক্রিন হলে জুম কনফার্ম করা
        player.on("fullscreen", (e) => {
            const videoTag = document.querySelector('video');
            if(videoTag) videoTag.style.objectFit = "cover";
        });

        player.on("error", () => {
            const loader = document.getElementById("loader");
            loader.classList.remove("hide-now"); 
            loader.innerHTML = `<div style="color:white;text-align:center;"><i class="fas fa-times-circle" style="font-size:40px;color:red"></i><p>Offline</p></div>`;
        });
    }
</script>

</body>
</html>
