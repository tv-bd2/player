<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Slim - Plyr Neon</title>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* বেসিক সেটআপ */
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; position: fixed; }
        
        /* কন্টেইনার ফিক্স */
        .video-container { width:100%; height:100%; position: absolute; }
        video { width: 100%; height: 100%; object-fit: fill; }

        /* Plyr কাস্টমাইজেশন (Neon Theme) */
        :root {
            --plyr-color-main: #00c3ff; /* নিয়ন ব্লু */
            --plyr-video-control-background-hover: rgba(0, 195, 255, 0.2);
        }

        /* লোডার ডিজাইন (আপনার বর্তমান স্টাইল অনুযায়ী) */
        #loader {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: #000; display:flex; justify-content:center; align-items:center;
            z-index:9999; flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .loader-container { position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; }
        .loader-brand { text-align: center; z-index: 10; }
        .tv-icon { font-size: 28px; color: #00c3ff; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0, 195, 255, 0.7); }
        .brand-name { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        .brand-name span { color: #00c3ff; }

        .neon-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; animation: ring-rotate 2s linear infinite; }
        .neon-ring:nth-child(1) { border-bottom: 1.5px solid #00c3ff; box-shadow: 0 2px 8px rgba(0, 195, 255, 0.4); }
        .neon-ring:nth-child(2) { border-right: 1.5px solid rgba(255, 255, 255, 0.5); animation: ring-rotate 1.5s linear infinite reverse; }

        @keyframes ring-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* এরর মেসেজ */
        .error-content { text-align: center; color: #fff; z-index: 10000; }
        .error-content i { font-size: 40px; color: #ff4d4d; margin-bottom: 15px; }

        .hide-now { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-container">
        <div class="neon-ring"></div>
        <div class="neon-ring"></div>
        <div class="loader-brand">
            <i class="fas fa-tv tv-icon"></i>
            <div class="brand-name">RS LIVE <span>TV</span></div>
        </div>
    </div>
</div>

<div class="video-container">
    <video id="player" playsinline controls></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    const video = document.querySelector('#player');
    const loader = document.getElementById('loader');
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('url');

    if (!source) {
        loader.innerHTML = '<div class="error-content"><p>No Stream URL Found!</p></div>';
    } else {
        // Plyr অপশনস
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
            settings: ['quality', 'speed'],
            ratio: '16:9'
        });

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(source);
            hls.attachMedia(video);
            window.hls = hls;

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(() => {
                    console.log("Autoplay blocked, waiting for interaction");
                });
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    showError();
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = source;
        }

        // ইভেন্ট লিসেনার
        video.addEventListener('playing', () => {
            loader.classList.add('hide-now');
        });

        video.addEventListener('error', () => {
            showError();
        });

        function showError() {
            loader.classList.remove('hide-now');
            loader.innerHTML = `
                <div class="error-content">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>Stream Offline or Expired!</p>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>
            `;
        }
    }
</script>

</body>
</html>
