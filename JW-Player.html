<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player Slim</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; }
        
        #player { width:100%; height:100%; position: absolute; top:0; left:0; }

        /* স্লিম এবং ছোট লোডার */
        #loader {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:#000;
            display:flex; justify-content:center; align-items:center;
            z-index:9999;
        }

        .loader-box {
            text-align: center;
            position: relative;
        }

        /* টিভি আইকন - ছোট এবং চিকন */
        .tv-icon {
            font-size: 40px;
            color: #00c3ff;
            margin-bottom: 8px;
            display: block;
            animation: pulse-lite 1.5s infinite ease-in-out;
        }

        /* ব্র্যান্ড নাম - চিকন এবং ছোট */
        .brand-name {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand-name span { color: #00c3ff; }

        /* চিকন লোডিং বার */
        .slim-bar {
            width: 100px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin: 12px auto 0;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .slim-bar::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: #00c3ff;
            animation: slide 1.2s infinite linear;
        }

        @keyframes slide {
            100% { left: 100%; }
        }

        @keyframes pulse-lite {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        /* ভিডিও স্ট্রেচ ফিক্স */
        .jw-video.jw-reset {
            object-fit: fill !important;
        }

        /* ইন্সট্যান্ট হাইড ইফেক্ট */
        .hide-loader {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-box">
        <i class="fas fa-tv tv-icon"></i>
        <div class="brand-name">RS <span>Live TV</span></div>
        <div class="slim-bar"></div>
    </div>
</div>

<div id="player"></div>

<script>
    function getStreamUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('url');
    }

    const streamSource = getStreamUrl();

    if (streamSource) {
        const player = jwplayer("player");

        player.setup({
            playlist: [{
                file: streamSource,
                type: "hls"
            }],
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false,
            stretching: "exactfit", 
            controls: true
        });

        player.on("ready", function() {
            player.setMute(false);
            player.setVolume(100);
        });

        // ভিডিও প্লে হওয়ার সাথে সাথেই হাইড হবে
        player.on("play", function() {
            document.getElementById("loader").classList.add("hide-loader");
        });

        player.on("error", function() {
            alert("Stream Failed!");
        });

    } else {
        document.querySelector(".brand-name").innerHTML = "<span>No URL</span>";
    }
</script>

</body>
</html>
